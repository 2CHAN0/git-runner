name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run tests on'
        required: false

# Cancel in-progress runs for the same ref to save Actions minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Runner 상태 확인 → 동적 분기
  #    기존 ci.yml의 install job에 있던 label/event 조건을 여기로 이동.
  #    이 job이 스킵되면 downstream 전체가 스킵된다.
  # ──────────────────────────────────────────────
  check-runner:
    name: Check Runner
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && (github.event.label.name == 'run-tests' || github.event.label.name == 'auto-merge')) ||
      (github.event_name == 'pull_request' && github.event.action == 'synchronize' && (contains(github.event.pull_request.labels.*.name, 'run-tests') || contains(github.event.pull_request.labels.*.name, 'auto-merge')))
    outputs:
      is_self_hosted: ${{ steps.pick.outputs.is_self_hosted }}
    steps:
      - name: Check self-hosted runner availability
        id: pick
        env:
          GH_TOKEN: ${{ secrets.RUNNER_TOKEN }}
        run: |
          runners=$(gh api repos/${{ github.repository }}/actions/runners \
            --jq '[.runners[] | select(.status=="online")] | length' 2>/dev/null || echo "0")
          if [ "$runners" -gt 0 ]; then
            echo "is_self_hosted=true" >> $GITHUB_OUTPUT
            echo "✅ Self-hosted runner online ($runners available)"
          else
            echo "is_self_hosted=false" >> $GITHUB_OUTPUT
            echo "⚠️ No self-hosted runner — falling back to GitHub hosted"
          fi

  # ──────────────────────────────────────────────
  # 2-A. Self-hosted: 단일 job에서 install→test→build→integration 순차 실행
  #
  #      continue-on-error: true
  #      → 어떤 step에서든 실패해도 workflow는 계속 진행되어
  #        아래 fallback job들이 실행된다.
  # ──────────────────────────────────────────────
  ci-self-hosted:
    name: CI (self-hosted)
    needs: check-runner
    if: needs.check-runner.outputs.is_self_hosted == 'true'
    runs-on: self-hosted
    continue-on-error: true
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      RESEND_API_KEY: re_dummy_key
    steps:
      - name: Clean workspace
        run: |
          rm -rf "$GITHUB_WORKSPACE"/*
          rm -rf "$GITHUB_WORKSPACE"/.??*

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true

      # ── Install ──
      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma', 'patches/**') }}

      - name: Setup Node.js
        if: steps.cache-nm.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      # ── Unit Tests ──
      - name: Run tests
        run: npm test

      # ── Build (env는 기존 ci.yml build job과 동일하게 dummy 값 사용) ──
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npm run build

      # ── Integration Tests (Docker Compose로 Postgres) ──
      - name: Start Postgres
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Setup database schema
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/test
          DIRECT_URL: postgresql://test:test@localhost:5433/test
        run: npx prisma db push --skip-generate

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/test
          DIRECT_URL: postgresql://test:test@localhost:5433/test
        run: npm run test:integration

      - name: Stop Postgres
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Clean workspace
        if: always()
        run: |
          rm -rf "$GITHUB_WORKSPACE"/*
          rm -rf "$GITHUB_WORKSPACE"/.??*

  # ──────────────────────────────────────────────
  # 2-B. Hosted fallback (기존 ci.yml 병렬 파이프라인 그대로)
  #
  #      아래 job들의 fallback 조건:
  #        - self-hosted runner 부재 (is_self_hosted == 'false')
  #        - 또는 self-hosted 실행 실패 (ci-self-hosted.result != 'success')
  #
  #      self-hosted 성공 시에는 모두 스킵된다.
  # ──────────────────────────────────────────────
  install:
    name: Install
    needs: [check-runner, ci-self-hosted]
    if: |
      always() && !cancelled() &&
      needs.check-runner.result == 'success' &&
      (needs.check-runner.outputs.is_self_hosted == 'false' ||
       needs.ci-self-hosted.result != 'success')
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: echo "key=node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'prisma/schema.prisma', 'patches/**') }}" >> "$GITHUB_OUTPUT"

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.key }}

      - name: Setup Node.js
        if: steps.cache-nm.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

  test-shard:
    name: Test (${{ matrix.shard }}/2)
    needs: [check-runner, ci-self-hosted, install]
    if: |
      always() && !cancelled() &&
      needs.install.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}

      - name: Run tests (shard ${{ matrix.shard }}/2)
        run: npm test -- --shard=${{ matrix.shard }}/2

  build:
    name: Build
    needs: [check-runner, ci-self-hosted, install]
    if: |
      always() && !cancelled() &&
      needs.install.result == 'success'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy
      RESEND_API_KEY: re_dummy_key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build
        run: npm run build

  integration:
    name: Integration Tests
    needs: [check-runner, ci-self-hosted, install]
    if: |
      always() && !cancelled() &&
      needs.install.result == 'success'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/test
      DIRECT_URL: postgresql://test:test@localhost:5433/test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ needs.install.outputs.cache-key }}

      - name: Setup database schema
        run: npx prisma db push --skip-generate

      - name: Run integration tests
        run: npm run test:integration

  # ──────────────────────────────────────────────
  # 3. Aggregator
  #
  #    자동 머지(auto-merge.yml)가 branch protection의 required status
  #    check로 이 "Test" job 이름을 본다. 이 job은 다음 두 경로 중 하나가
  #    성공했는지를 확인한다:
  #      A) ci-self-hosted 성공
  #      B) ci-self-hosted 실패/부재 → fallback(test-shard + build + integration) 성공
  # ──────────────────────────────────────────────
  test:
    name: Test
    needs: [check-runner, ci-self-hosted, test-shard, build, integration]
    if: always() && !cancelled() && needs.check-runner.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify pipeline result
        run: |
          SELF="${{ needs.ci-self-hosted.result }}"
          SHARD="${{ needs.test-shard.result }}"
          BUILD="${{ needs.build.result }}"
          INTEG="${{ needs.integration.result }}"

          echo "ci-self-hosted: $SELF"
          echo "test-shard:     $SHARD"
          echo "build:          $BUILD"
          echo "integration:    $INTEG"

          # Path A: self-hosted succeeded (fallback jobs skipped)
          if [ "$SELF" = "success" ]; then
            echo "✅ Passed on self-hosted runner"
            exit 0
          fi

          # Path B: fallback jobs all succeeded
          if [ "$SHARD" = "success" ] && [ "$BUILD" = "success" ] && [ "$INTEG" = "success" ]; then
            echo "✅ Passed on GitHub hosted runner (fallback)"
            exit 0
          fi

          echo "❌ Pipeline failed"
          exit 1
