name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-self-hosted:
    runs-on: self-hosted
    timeout-minutes: 5
    continue-on-error: true
    outputs:
      result: ${{ steps.test.outcome }}
    steps:
      - name: Clean workspace
        run: |
          rm -rf "$GITHUB_WORKSPACE"/*
          rm -rf "$GITHUB_WORKSPACE"/.??*

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up Python
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Run tests
        id: test
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short

      - name: Clean workspace
        if: always()
        run: |
          rm -rf "$GITHUB_WORKSPACE"/*
          rm -rf "$GITHUB_WORKSPACE"/.??*

  test-hosted-fallback:
    needs: test-self-hosted
    if: needs.test-self-hosted.result == 'failure' || needs.test-self-hosted.outputs.result != 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
