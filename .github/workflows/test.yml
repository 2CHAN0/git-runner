name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-runner:
    runs-on: ubuntu-latest
    outputs:
      use_self_hosted: ${{ steps.check.outputs.available }}
    steps:
      - name: Check self-hosted runner availability
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          runners=$(gh api repos/${{ github.repository }}/actions/runners --jq '[.runners[] | select(.status=="online")] | length')
          if [ "$runners" -gt 0 ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✅ Self-hosted runner online ($runners available)"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ No self-hosted runner online, will fallback to GitHub hosted"
          fi

  test-self-hosted:
    needs: check-runner
    if: needs.check-runner.outputs.use_self_hosted == 'true'
    runs-on: self-hosted
    steps:
      - name: Clean workspace
        run: |
          rm -rf "$GITHUB_WORKSPACE"/*
          rm -rf "$GITHUB_WORKSPACE"/.??*

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Set up Python
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short

      - name: Clean workspace
        if: always()
        run: |
          rm -rf "$GITHUB_WORKSPACE"/*
          rm -rf "$GITHUB_WORKSPACE"/.??*

  test-hosted:
    needs: check-runner
    if: needs.check-runner.outputs.use_self_hosted == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
